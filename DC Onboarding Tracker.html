<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DC Onboarding Tracker — Manager Workspace</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eeeff6;--surface:#fff;--surface-2:#f6f7fc;
  --border:rgba(0,0,0,.07);--border-2:rgba(0,0,0,.12);
  --text-1:#1c1c30;--text-2:#56567a;--text-3:#9898b8;
  --accent:#635bff;--accent-bg:rgba(99,91,255,.08);
  --ok:#22c55e;--ok-bg:rgba(34,197,94,.1);
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,.1);
  --danger:#ef4444;--danger-bg:rgba(239,68,68,.1);
  --muted:#9898b8;--muted-bg:rgba(0,0,0,.04);
  --r:14px;--r-xl:22px;--r-full:999px;
  --shadow:0 2px 4px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.07),inset 0 1px 0 rgba(255,255,255,.9);
  --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.9);
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text-1);font-size:15px;display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ──────────────────────────────────────── */
#sidebar{width:260px;min-width:260px;background:var(--surface);display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--border);box-shadow:2px 0 12px rgba(0,0,0,.04)}
#sidebar-header{padding:18px 14px 0}
.sidebar-brand{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.sidebar-brand-icon{width:38px;height:38px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;box-shadow:0 4px 12px rgba(99,91,255,.35)}
.sidebar-brand-name{font-size:14px;font-weight:700;color:var(--text-1)}
.sidebar-brand-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.sidebar-search{position:relative;margin-bottom:10px}
.sidebar-search i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:12px;pointer-events:none}
.sidebar-search input{width:100%;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r-full);padding:9px 12px 9px 34px;color:var(--text-1);font:inherit;font-size:13px;outline:none;transition:border-color .15s}
.sidebar-search input::placeholder{color:var(--text-3)}
.sidebar-search input:focus{border-color:var(--accent);background:#fff}
.sidebar-filters{display:flex;gap:5px;flex-wrap:wrap;padding-bottom:12px}
.filter-chip{padding:5px 12px;border-radius:var(--r-full);background:var(--muted-bg);border:1.5px solid transparent;color:var(--text-3);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.filter-chip:hover{background:var(--accent-bg);color:var(--accent)}
.filter-chip.active{background:var(--accent-bg);border-color:rgba(99,91,255,.25);color:var(--accent)}
#sidebar-list{flex:1;overflow-y:auto;padding:8px 10px}
#sidebar-list::-webkit-scrollbar{width:4px}
#sidebar-list::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
.hire-card{border-radius:var(--r);padding:12px 13px;margin-bottom:6px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;position:relative}
.hire-card:hover{background:var(--surface-2)}
.hire-card.active{background:var(--accent-bg);border-color:rgba(99,91,255,.2);border-left:3px solid var(--accent)}
.hire-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.hire-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.02em;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hire-card-info{flex:1;min-width:0}
.hire-card-name{font-size:13px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hire-card-meta{font-size:11px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hire-track{height:3px;background:rgba(0,0,0,.07);border-radius:3px;overflow:hidden;margin-top:8px}
.hire-track-fill{height:100%;border-radius:3px;transition:width .4s}
.hire-empty{padding:24px;text-align:center;color:var(--text-3);font-size:13px;line-height:1.7}
#sidebar-footer{padding:12px 10px 14px;border-top:1px solid var(--border)}
.sidebar-add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;background:var(--accent);border:none;border-radius:var(--r-full);color:#fff;font:600 13px/1 system-ui;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(99,91,255,.35)}
.sidebar-add-btn:hover{background:#4f46e5;box-shadow:0 6px 20px rgba(99,91,255,.45)}

/* ── MAIN ──────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:var(--shadow-sm)}
#topbar-title{font-size:16px;font-weight:700;flex:1;color:var(--text-1)}
.view-tabs{display:flex;gap:3px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r-full);padding:3px}
.view-tab{padding:6px 18px;border:none;border-radius:var(--r-full);background:transparent;font:600 13px/1 system-ui;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.view-tab i{font-size:12px}
.view-tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow-sm)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-full);font:600 13px/1 system-ui;cursor:pointer;transition:all .15s;border:1.5px solid transparent}
.btn i{font-size:12px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(99,91,255,.3)}
.btn-primary:hover{background:#4f46e5}
.btn-secondary{background:var(--surface);color:var(--text-2);border-color:var(--border);box-shadow:var(--shadow-sm)}
.btn-secondary:hover{background:var(--surface-2)}
.btn-ghost{background:transparent;color:var(--text-2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.18)}
.btn-sm{padding:6px 14px;font-size:12px}
#content{flex:1;overflow:hidden}
#detail-view,#overview-view{height:100%;overflow-y:auto;padding:20px 24px}
#detail-view{display:block}
#overview-view{display:none}
#detail-view::-webkit-scrollbar,#overview-view::-webkit-scrollbar{width:5px}
#detail-view::-webkit-scrollbar-thumb,#overview-view::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}

/* ── BADGES ─────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--r-full);font-size:11px;font-weight:700;border:1px solid transparent;letter-spacing:.01em;white-space:nowrap}
.badge i{font-size:10px}
.s-not-started{background:var(--muted-bg);color:var(--muted)}
.s-in-progress{background:var(--warn-bg);color:var(--warn)}
.s-done{background:var(--ok-bg);color:var(--ok)}
.s-blocked{background:var(--danger-bg);color:var(--danger)}
.s-not-applicable{background:var(--muted-bg);color:var(--text-3)}
.badge-phase{background:var(--accent-bg);color:var(--accent)}

/* ── EMPTY STATE ────────────────────────────────────── */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-3);text-align:center;gap:14px}
.es-icon{width:68px;height:68px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--accent);box-shadow:var(--shadow)}
.es-text{font-size:15px;max-width:300px;line-height:1.8;color:var(--text-2)}

/* ── HIRE DETAIL ────────────────────────────────────── */
.hire-detail-stack{display:flex;flex-direction:column;gap:16px}
.detail-hero{background:var(--surface);border-radius:var(--r-xl);padding:22px 24px;box-shadow:var(--shadow)}
.detail-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.detail-hero-id{display:flex;align-items:center;gap:16px}
.detail-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.02em;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.detail-name{font-size:22px;font-weight:800;color:var(--text-1);letter-spacing:-.4px}
.detail-meta{font-size:13px;color:var(--text-2);margin-top:5px;line-height:1.8}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.detail-stat{background:var(--surface-2);border-radius:var(--r);padding:14px 16px;border:1.5px solid var(--border)}
.stat-label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:800;color:var(--text-1);line-height:1}
.stat-value.danger{color:var(--danger)}
.stat-sub{font-size:12px;color:var(--text-2);margin-top:5px;line-height:1.6}
.stat-actions{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.stat-action-item{font-size:12px;color:var(--text-2);padding:6px 10px;background:var(--surface);border-radius:10px;border-left:3px solid var(--accent);box-shadow:var(--shadow-sm)}
.progress-bar{height:6px;background:var(--muted-bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}

/* ── DETAIL GRID ───────────────────────────────────── */
.detail-grid{display:grid;grid-template-columns:1fr 280px;gap:18px}

/* ── SECTION GROUPS (collapsible) ──────────────────── */
.group-card{background:var(--surface);border-radius:var(--r-xl);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.group-card:last-child{margin-bottom:0}
.group-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;user-select:none;transition:background .12s;border-bottom:1.5px solid transparent}
.group-header:hover{background:var(--surface-2)}
.group-card:not(.collapsed) .group-header{border-bottom-color:var(--border)}
.group-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.group-header-text{flex:1;min-width:0}
.group-title{font-size:14px;font-weight:700;color:var(--text-1)}
.group-desc{font-size:12px;color:var(--text-3);margin-top:1px}
.group-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.group-pct-bar{width:70px;height:5px;background:var(--muted-bg);border-radius:3px;overflow:hidden}
.group-pct-fill{height:100%;border-radius:3px}
.group-pct-label{font-size:12px;font-weight:700;color:var(--text-3);min-width:32px;text-align:right}
.group-chevron{font-size:11px;color:var(--text-3);transition:transform .2s}
.group-card.collapsed .group-chevron{transform:rotate(-90deg)}
.group-body{}
.group-card.collapsed .group-body{display:none}

/* ── TASK ROW (cozy) ───────────────────────────────── */
.task-row{padding:14px 20px;border-bottom:1.5px solid var(--border);cursor:default;transition:background .12s}
.task-row:last-child{border-bottom:none}
.task-row.task-blocked{background:rgba(239,68,68,.03);border-left:3px solid var(--danger)}
.task-row.expanded{background:var(--surface-2)}
.task-main-row{display:grid;grid-template-columns:32px 1fr auto;gap:12px;align-items:center}
/* circle status button */
.task-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border-2,rgba(0,0,0,.15));background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:11px;color:transparent}
.task-circle:hover{border-color:var(--accent);transform:scale(1.08)}
.task-circle.in-progress{background:var(--warn);border-color:var(--warn);color:#fff}
.task-circle.done{background:var(--ok);border-color:var(--ok);color:#fff}
.task-circle.blocked{background:var(--danger);border-color:var(--danger);color:#fff}
.task-circle.not-applicable{background:var(--muted-bg);border-color:rgba(0,0,0,.1);color:var(--text-3)}
.task-circle.not-started{border-color:rgba(0,0,0,.18);color:transparent}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:600;color:var(--text-1);line-height:1.4}
.task-title.is-done{text-decoration:line-through;color:var(--text-3)}
.task-title.is-na{color:var(--text-3)}
.task-desc{font-size:12px;color:var(--text-3);margin-top:2px;line-height:1.5}
.task-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
/* expand area */
.task-expand{padding:14px 20px 16px 64px;display:none}
.task-row.expanded .task-expand{display:block}
.task-expand-grid{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:start}
.task-note-area{width:100%}
.task-note-area textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:var(--surface);color:var(--text-1);outline:none;resize:vertical;min-height:60px;line-height:1.6;transition:border-color .15s}
.task-note-area textarea:focus{border-color:var(--accent)}
.task-note-label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.task-inline-sel{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r);font:inherit;font-size:12px;background:var(--surface);color:var(--text-1);outline:none;cursor:pointer;transition:border-color .15s}
.task-inline-sel:focus{border-color:var(--accent)}
.task-expand-updated{font-size:11px;color:var(--text-3);margin-top:8px}

/* ── RIGHT PANEL ───────────────────────────────────── */
#right-panel-col{position:sticky;top:0;align-self:start}
.right-panel{background:var(--surface);border-radius:var(--r-xl);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.right-panel:last-child{margin-bottom:0}
.rp-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text-1)}
.rp-title i{color:var(--accent);font-size:13px}
.rp-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:var(--surface-2);color:var(--text-1);outline:none;resize:vertical;min-height:72px;line-height:1.6;transition:border-color .15s}
.rp-textarea:focus{border-color:var(--accent);background:#fff}

/* Training Schedule */
.ts-form{display:flex;flex-direction:column;gap:8px;padding:12px;background:var(--surface-2);border-radius:var(--r);margin-bottom:12px}
.ts-form-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ts-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;font:inherit;font-size:12px;background:var(--surface);color:var(--text-1);outline:none;transition:border-color .15s}
.ts-input:focus{border-color:var(--accent)}
.ts-add-btn{width:100%;padding:8px;border:none;border-radius:10px;background:var(--accent);color:#fff;font:600 12px/1 system-ui;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.ts-add-btn:hover{background:#4f46e5}
.ts-list{display:flex;flex-direction:column;gap:7px}
.ts-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--surface-2);border-radius:var(--r);border:1.5px solid var(--border)}
.ts-item.ts-done{opacity:.6}
.ts-item.ts-done .ts-topic{text-decoration:line-through;color:var(--text-3)}
.ts-date-chip{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-bg);padding:3px 7px;border-radius:var(--r-full);white-space:nowrap;flex-shrink:0;margin-top:1px}
.ts-info{flex:1;min-width:0}
.ts-topic{font-size:13px;font-weight:600;color:var(--text-1)}
.ts-with{font-size:11px;color:var(--text-3);margin-top:2px}
.ts-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ts-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-2,rgba(0,0,0,.15));background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .13s}
.ts-check.done{background:var(--ok);border-color:var(--ok);color:#fff}
.ts-del{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .13s}
.ts-del:hover{background:var(--danger-bg);color:var(--danger)}

/* Manager Updates */
.mu-form{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.mu-post-btn{align-self:flex-end;padding:7px 16px;border:none;border-radius:var(--r-full);background:var(--accent);color:#fff;font:600 12px/1 system-ui;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.mu-post-btn:hover{background:#4f46e5}
.mu-list{display:flex;flex-direction:column;gap:7px;max-height:200px;overflow-y:auto}
.mu-list::-webkit-scrollbar{width:3px}
.mu-list::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
.mu-item{padding:10px 12px;background:var(--surface-2);border-radius:var(--r);border:1.5px solid var(--border);position:relative}
.mu-ts{font-size:10px;font-weight:700;color:var(--text-3);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.mu-text{font-size:13px;color:var(--text-1);line-height:1.6}
.mu-del{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:10px;padding:0;transition:color .13s}
.mu-del:hover{color:var(--danger)}
.mu-empty{font-size:12px;color:var(--text-3);text-align:center;padding:10px 0}

/* Phase Readiness */
.phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.phase-box{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px}
.phase-box-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.phase-box-value{font-size:17px;font-weight:800;color:var(--text-1);line-height:1}
.phase-box-bar{height:3px;background:var(--muted-bg);border-radius:3px;overflow:hidden;margin-top:6px}
.phase-box-fill{height:100%;border-radius:3px}

/* ── DASHBOARD ─────────────────────────────────────── */
.ov-wrap{display:flex;flex-direction:column;gap:16px}
.ov-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ov-kpi{background:var(--surface);border-radius:var(--r-xl);padding:20px 22px;display:flex;align-items:flex-start;gap:16px;box-shadow:var(--shadow)}
.ov-kpi-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.kpi-total .ov-kpi-icon{background:var(--accent-bg);color:var(--accent)}
.kpi-blocked .ov-kpi-icon{background:var(--danger-bg);color:var(--danger)}
.kpi-soon .ov-kpi-icon{background:var(--warn-bg);color:var(--warn)}
.kpi-done .ov-kpi-icon{background:var(--ok-bg);color:var(--ok)}
.ov-kpi-body{flex:1;min-width:0}
.ov-kpi-num{font-size:34px;font-weight:800;color:var(--text-1);line-height:1;margin-bottom:4px}
.kpi-blocked .ov-kpi-num{color:var(--danger)}
.kpi-soon .ov-kpi-num{color:var(--warn)}
.kpi-done .ov-kpi-num{color:var(--ok)}
.ov-kpi-label{font-size:14px;font-weight:700;color:var(--text-1)}
.ov-kpi-sub{font-size:12px;color:var(--text-3);margin-top:3px}
.ov-pipeline-card{background:var(--surface);border-radius:var(--r-xl);padding:22px 24px;box-shadow:var(--shadow)}
.ov-card-title{font-size:14px;font-weight:700;color:var(--text-1);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.ov-card-title i{color:var(--text-3);font-size:13px}
.ov-pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:16px}
.ov-pipe-step{display:flex;flex-direction:column;gap:6px}
.ov-pipe-label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
.ov-pipe-count{font-size:26px;font-weight:800;color:var(--text-1);line-height:1}
.ov-pipe-bar-wrap{height:5px;background:var(--muted-bg);border-radius:3px;overflow:hidden}
.ov-pipe-bar{height:100%;border-radius:3px;transition:width .4s}
.ov-pipe-sub{font-size:11px;color:var(--text-3)}
.ov-main{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}
.ov-roster-card{background:var(--surface);border-radius:var(--r-xl);padding:22px 24px;box-shadow:var(--shadow)}
.ov-roster-row{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:14px;padding:11px 8px;border-radius:var(--r);cursor:pointer;transition:background .12s}
.ov-roster-row:not(:last-child){border-bottom:1px solid var(--border)}
.ov-roster-row:hover{background:var(--surface-2)}
.ov-roster-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.13)}
.ov-roster-info{min-width:0}
.ov-roster-name{font-size:14px;font-weight:700;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-roster-meta{font-size:12px;color:var(--text-3);margin-top:2px}
.ov-roster-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.ov-roster-progress{width:110px;flex-shrink:0}
.ov-roster-pct{font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:5px;text-align:right}
.ov-roster-bar{height:5px;background:var(--muted-bg);border-radius:3px;overflow:hidden}
.ov-roster-fill{height:100%;border-radius:3px}
.ov-empty{font-size:13px;color:var(--text-3);padding:10px 4px;line-height:1.7}
.ov-side{display:flex;flex-direction:column;gap:14px}
.ov-side-card{background:var(--surface);border-radius:var(--r-xl);padding:20px;box-shadow:var(--shadow)}
.ov-side-title{font-size:13px;font-weight:700;color:var(--text-1);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.ov-side-title i{font-size:12px;color:var(--text-3)}
.ov-side-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ov-side-item:last-child{border-bottom:none;padding-bottom:0}
.ov-side-item:first-child{padding-top:0}
.ov-side-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ov-side-item-name{font-size:13px;font-weight:700;color:var(--text-1)}
.ov-side-item-sub{font-size:12px;color:var(--text-3);margin-top:3px;line-height:1.6}

/* ── MODALS ─────────────────────────────────────────── */
.modal{position:fixed;inset:0;background:rgba(28,28,48,.45);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px;z-index:100}
.modal.open{display:flex}
.modal-box{background:var(--surface);border-radius:var(--r-xl);width:min(600px,100%);max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.modal-header{padding:22px 26px 18px}
.modal-title{font-size:18px;font-weight:800;color:var(--text-1)}
.modal-sub{font-size:13px;color:var(--text-2);margin-top:4px}
.modal-body{padding:0 26px 18px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:16px 26px;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.modal-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.modal-field label{display:block;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.modal-input,.modal-select,.modal-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font:inherit;font-size:14px;background:var(--surface-2);color:var(--text-1);outline:none;transition:border-color .15s}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:var(--accent);background:#fff}
.modal-textarea{min-height:88px;resize:vertical;line-height:1.6}
.email-field{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:13px;margin-bottom:0}
.email-field strong{color:var(--text-3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.email-textarea{width:100%;min-height:210px;padding:12px;border:1.5px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:var(--surface-2);color:var(--text-1);resize:vertical;outline:none;line-height:1.7;transition:border-color .15s}
.email-textarea:focus{border-color:var(--accent);background:#fff}

@media(max-width:1100px){.detail-grid{grid-template-columns:1fr}.detail-stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.ov-kpis{grid-template-columns:repeat(2,1fr)}.ov-main{grid-template-columns:1fr}.ov-pipeline{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){#sidebar{width:100%;min-width:0;height:auto}.modal-fields{grid-template-columns:1fr 1fr}}
</style>
</head>

<!-- ADD HIRE MODAL -->
<div class="modal" id="add-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Create Onboarding Profile</div>
      <div class="modal-sub">Manager-owned tracking for this hire&rsquo;s onboarding progress.</div>
    </div>
    <div class="modal-body">
      <div class="modal-fields">
        <div class="modal-field"><label>First name</label><input class="modal-input" id="f-first"></div>
        <div class="modal-field"><label>Last name</label><input class="modal-input" id="f-last"></div>
        <div class="modal-field"><label>Hire type</label><select class="modal-select" id="f-hire-type"><option value="external">External hire</option><option value="internal">Internal transfer</option></select></div>
      </div>
      <div class="modal-fields">
        <div class="modal-field"><label>Department</label><input class="modal-input" id="f-dept" value="Data Consultant"></div>
        <div class="modal-field"><label>Manager</label><input class="modal-input" id="f-manager"></div>
        <div class="modal-field"><label>Preset</label><select class="modal-select" id="f-preset"><option value="dc-core">Data Consultant</option></select></div>
      </div>
      <div class="modal-fields">
        <div class="modal-field"><label>Start date</label><input class="modal-input" id="f-start" type="date"></div>
        <div class="modal-field"><label>Employee ID</label><input class="modal-input" id="f-eid"></div>
        <div class="modal-field"><label>Email</label><input class="modal-input" id="f-email" type="email"></div>

      <div class="modal-field"><label>Manager summary</label><textarea class="modal-textarea" id="f-summary" placeholder="What should the manager keep top of mind for this hire?"></textarea></div>

      <button class="btn btn-ghost" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addHire()"><i class="fa-solid fa-check"></i> Create Profile</button>
    </div>
  </div>
</div>

<!-- EMAIL MODAL -->
<div class="modal" id="email-modal">

    </div>
  </div>
</div>

let state={version:APP_VERSION,hires:[],selectedHireId:null,filter:'all',view:'detail'},currentDraft=null;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const phaseLabel=id=>(PHASES.find(p=>p[0]===id)||PHASES[0])[1];
const initials=h=>`${h.first?.[0]||''}${h.last?.[0]||''}`.toUpperCase()||'NA';
const fmtDate=v=>v?new Date(v+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'Not set';
const fmtDT=v=>v?new Date(v).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'No updates yet';
const fmtDateShort=v=>v?new Date(v+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
const now=()=>new Date().toISOString();
const uid=()=>`id-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
const presetItems=id=>PRESETS[id||'dc-core'].sections.flatMap(s=>s.items.map(i=>({id:i[0],title:i[1],desc:i[2],owner:i[3],ownerLabel:i[4],category:i[5],phase:i[6],priority:i[7],emailTemplateKey:i[8],sectionId:s.id,sectionTitle:s.title})));
const makeTask=i=>({status:'not-started',note:'',updatedAt:'',ownerOverride:'',skippedReason:'',targetPhase:i.phase});
const PHASE_ICONS={prestart:'fa-hourglass-start',day1:'fa-sun',week1:'fa-calendar-week',week2:'fa-calendar-days',month1:'fa-calendar-check',complete:'fa-graduation-cap'};
const STATUS_ICONS={'not-started':'fa-circle','in-progress':'fa-circle-half-stroke',done:'fa-circle-check',blocked:'fa-triangle-exclamation','not-applicable':'fa-ban'};
const phaseBadge=id=>`<span class="badge badge-phase"><i class="fa-solid ${PHASE_ICONS[id]||'fa-calendar'}"></i> ${phaseLabel(id)}</span>`;
const statusBadge=s=>`<span class="badge ${statusClass(s)}">${statusLabel(s)}</span>`;
const pcolor=p=>p>=100?'var(--ok)':p>=60?'var(--accent)':p>=30?'var(--warn)':'var(--muted)';

function createHire(d){const checklist={};presetItems(d.departmentPreset).forEach(i=>checklist[i.id]=makeTask(i));return{id:`hire-${Date.now()}-${Math.random().toString(36).slice(2)}`,first:d.first||'',last:d.last||'',dept:d.dept||'Data Consultant',manager:d.manager||'',email:d.email||'',eid:d.eid||'',startDate:d.startDate||'',hireType:d.hireType||'external',phase:'prestart',managerSummary:d.managerSummary||'',managerNotes:d.managerNotes||'',departmentPreset:d.departmentPreset||'dc-core',lastUpdatedAt:now(),createdAt:now(),checklist,colorIdx:typeof d.colorIdx==='number'?d.colorIdx:Math.floor(Math.random()*COLORS.length),trainingSessions:[],updates:[]}}

function migrateHire(h){const m=createHire({...h,managerSummary:h.managerSummary||h.notes||'',departmentPreset:h.departmentPreset||'dc-core'});m.id=h.id||m.id;m.createdAt=h.createdAt||m.createdAt;m.lastUpdatedAt=h.lastUpdatedAt||m.lastUpdatedAt;m.managerNotes=h.managerNotes||h.notes||'';m.trainingSessions=h.trainingSessions||[];m.updates=h.updates||[];presetItems(m.departmentPreset).forEach(i=>{const e=h.checklist?.[i.id];if(typeof e==='string')m.checklist[i.id]={...makeTask(i),status:e==='pending'?'not-started':e};else if(e&&typeof e==='object')m.checklist[i.id]={...makeTask(i),...e,status:e.status==='pending'?'not-started':(e.status||'not-started'),targetPhase:e.targetPhase||i.phase};});return m}

const tstate=(h,id)=>h.checklist[id];
const blockedCount=h=>presetItems(h.departmentPreset).filter(i=>tstate(h,i.id)?.status==='blocked').length;
function progress(h){const items=presetItems(h.departmentPreset).filter(i=>tstate(h,i.id)?.status!=='not-applicable');const done=items.filter(i=>tstate(h,i.id)?.status==='done').length;return{done,total:items.length,pct:items.length?Math.round(done/items.length*100):100}}
function currentPhase(h){for(const [id] of PHASES.slice(0,-1)){const items=presetItems(h.departmentPreset).filter(i=>i.phase===id&&tstate(h,i.id)?.status!=='not-applicable');if(items.length&&!items.every(i=>tstate(h,i.id)?.status==='done'))return id}return'complete'}
function overall(h){const p=progress(h);if(blockedCount(h))return'blocked';if(p.total&&p.done===p.total)return'complete';return presetItems(h.departmentPreset).some(i=>['done','in-progress'].includes(tstate(h,i.id)?.status))?'in-progress':'not-started'}
const statusClass=s=>({'not-started':'s-not-started','in-progress':'s-in-progress','blocked':'s-blocked','done':'s-done','complete':'s-done','not-applicable':'s-not-applicable'})[s]||'s-not-started';
const statusLabel=s=>({'not-started':'Not Started','in-progress':'In Progress','blocked':'Blocked','done':'Complete','complete':'Complete','not-applicable':'N/A'})[s]||'Not Started';
function startWindow(h){if(!h.startDate)return'No start date';const today=new Date(),start=new Date(h.startDate+'T12:00:00'),d=Math.round((start-new Date(today.getFullYear(),today.getMonth(),today.getDate(),12))/86400000);if(d>7)return'Future start';if(d>=1)return'Starting soon';if(d===0)return'Starts today';return'In progress'}
function save(){state.hires.forEach(h=>{h.phase=currentPhase(h)});localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function load(){const raw=localStorage.getItem(STORAGE_KEY);if(raw)try{const p=JSON.parse(raw);state={version:APP_VERSION,hires:(p.hires||[]).map(migrateHire),selectedHireId:p.selectedHireId||null,filter:p.filter||'all',view:p.view||'detail'}}catch(e){};if(!state.hires.length)seed();if(!state.selectedHireId&&state.hires.length)state.selectedHireId=state.hires[0].id}
function touch(h){h.lastUpdatedAt=now()}
function setStatusById(h,id,status,note){if(!h.checklist[id])return;h.checklist[id].status=status;if(typeof note==='string')h.checklist[id].note=note;h.checklist[id].updatedAt=now();touch(h)}
function score(h,i,cp){const s=tstate(h,i.id);return(s.status==='blocked'?0:1)+((s.targetPhase||i.phase)===cp?0:3)+(i.priority==='high'?0:i.priority==='medium'?2:4)}
function nextActions(h){const cp=currentPhase(h);return presetItems(h.departmentPreset).filter(i=>!['done','not-applicable'].includes(tstate(h,i.id)?.status)).sort((a,b)=>score(h,a,cp)-score(h,b,cp)).slice(0,3)}

// Training sessions
function addTrainingSession(hid){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  const dateEl=document.getElementById(`ts-date-${hid}`),topicEl=document.getElementById(`ts-topic-${hid}`),withEl=document.getElementById(`ts-with-${hid}`);
  const date=dateEl?.value,topic=topicEl?.value.trim(),withWho=withEl?.value.trim();
  if(!topic)return;
  h.trainingSessions=h.trainingSessions||[];
  h.trainingSessions.push({id:uid(),date:date||'',topic,with:withWho,done:false,createdAt:now()});
  touch(h);save();
  if(dateEl)dateEl.value='';if(topicEl)topicEl.value='';if(withEl)withEl.value='';
  renderRightPanel(h);
}
function toggleSession(hid,sid){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  const s=(h.trainingSessions||[]).find(x=>x.id===sid);if(!s)return;
  s.done=!s.done;touch(h);save();renderRightPanel(h);
}
function deleteSession(hid,sid){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  h.trainingSessions=(h.trainingSessions||[]).filter(x=>x.id!==sid);touch(h);save();renderRightPanel(h);
}
function postUpdate(hid){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  const el=document.getElementById(`mu-input-${hid}`);
  const text=el?.value.trim();if(!text)return;
  h.updates=h.updates||[];
  h.updates.unshift({id:uid(),text,createdAt:now()});
  touch(h);save();
  if(el)el.value='';
  renderRightPanel(h);
}
function deleteUpdate(hid,uid2){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  h.updates=(h.updates||[]).filter(x=>x.id!==uid2);touch(h);save();renderRightPanel(h);
}

function renderRightPanel(h){

  const sessionsList=sessions.length?sessions.map(s=>`
    <div class="ts-item ${s.done?'ts-done':''}">
      ${s.date?`<span class="ts-date-chip">${esc(fmtDateShort(s.date))}</span>`:''}
      <div class="ts-info">
        <div class="ts-topic">${esc(s.topic)}</div>
        ${s.with?`<div class="ts-with">with ${esc(s.with)}</div>`:''}
      </div>

        <button class="ts-check ${s.done?'done':''}" onclick="toggleSession('${h.id}','${s.id}')" title="${s.done?'Mark incomplete':'Mark done'}"><i class="fa-solid fa-check"></i></button>

      </div>
    </div>`).join(''):'<div style="font-size:12px;color:var(--text-3);text-align:center;padding:8px 0">No sessions scheduled yet.</div>';
  const trainingCard=`<div class="right-panel">

    <div class="ts-form">
      <div class="ts-form-row">
        <input class="ts-input" id="ts-date-${h.id}" type="date" placeholder="Date">
        <input class="ts-input" id="ts-with-${h.id}" type="text" placeholder="With who">
      </div>
      <input class="ts-input" id="ts-topic-${h.id}" type="text" placeholder="Topic or focus area">
      <button class="ts-add-btn" onclick="addTrainingSession('${h.id}')"><i class="fa-solid fa-plus"></i> Add Session</button>
    </div>
    <div class="ts-list">${sessionsList}</div>
  </div>`;

  // Manager updates
  const updates=(h.updates||[]);
  const updatesList=updates.length?updates.map(u=>`
    <div class="mu-item">
      <div class="mu-ts"><span>${esc(fmtDT(u.createdAt))}</span><button class="mu-del" onclick="deleteUpdate('${h.id}','${u.id}')" title="Delete"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="mu-text">${esc(u.text)}</div>
    </div>`).join(''):'<div class="mu-empty">No updates posted yet.</div>';
  const updatesCard=`<div class="right-panel">
    <div class="rp-title"><i class="fa-solid fa-bullhorn"></i> Manager Updates</div>
    <div class="mu-form">
      <textarea class="rp-textarea" id="mu-input-${h.id}" placeholder="Post an update, note, or observation&hellip;" style="min-height:60px"></textarea>
      <button class="mu-post-btn" onclick="postUpdate('${h.id}')"><i class="fa-solid fa-paper-plane"></i> Post Update</button>
    </div>
    <div class="mu-list">${updatesList}</div>
  </div>`;

  // Phase readiness
  const phaseCard=`<div class="right-panel">
    <div class="rp-title"><i class="fa-solid fa-chart-gantt"></i> Phase Readiness</div>
    <div class="phase-grid">${PHASES.slice(0,-1).map(ph=>{
      const items=presetItems(h.departmentPreset).filter(i=>i.phase===ph[0]&&tstate(h,i.id)?.status!=='not-applicable');
      const done=items.filter(i=>tstate(h,i.id)?.status==='done').length;
      const pct=items.length?Math.round(done/items.length*100):100;
      return`<div class="phase-box"><div class="phase-box-label">${esc(ph[1])}</div><div class="phase-box-value">${done}/${items.length}</div><div class="phase-box-bar"><div class="phase-box-fill" style="width:${pct}%;background:${pcolor(pct)}"></div></div></div>`;
    }).join('')}</div>
  </div>`;

  return summaryCard+trainingCard+updatesCard+phaseCard;
}

function renderSidebar(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const list=document.getElementById('sidebar-list');
  let hires=state.hires.filter(h=>{
    const txt=`${h.first} ${h.last} ${h.dept} ${h.manager} ${phaseLabel(currentPhase(h))}`.toLowerCase();
    if(q&&!txt.includes(q))return false;
    const o=overall(h),sw=startWindow(h);
    if(state.filter==='attention')return blockedCount(h)>0||progress(h).pct<70;
    if(state.filter==='starting-soon')return sw==='Starting soon'||sw==='Starts today';
    if(state.filter==='blocked')return o==='blocked';
    if(state.filter==='complete')return o==='complete';
    return true;
  }).sort((a,b)=>blockedCount(b)-blockedCount(a)||new Date(b.lastUpdatedAt)-new Date(a.lastUpdatedAt));
  list.innerHTML=hires.length?hires.map(h=>{
    const p=progress(h),bl=blockedCount(h),col=COLORS[h.colorIdx%COLORS.length];
    return `<div class="hire-card ${h.id===state.selectedHireId?'active':''}" onclick="selectHire('${h.id}')">

function renderGroupCard(h,group,cp){
  // Collect all items from this group's sections
  const sections=PRESETS[h.departmentPreset].sections.filter(s=>group.sectionIds.includes(s.id));
  const allItems=sections.flatMap(s=>s.items.map(i=>({id:i[0],title:i[1],desc:i[2],owner:i[3],ownerLabel:i[4],category:i[5],phase:i[6],priority:i[7],emailTemplateKey:i[8],sectionId:s.id})));
  const active=allItems.filter(i=>tstate(h,i.id)?.status!=='not-applicable');
  const done=active.filter(i=>tstate(h,i.id)?.status==='done').length;

  return `<div class="task-row ${isBlocked?'task-blocked':''}" id="taskrow-${i.id}">

          <select class="task-inline-sel" onchange="updateTaskField('${h.id}','${i.id}','targetPhase',this.value)">

            <option value="not-started" ${st==='not-started'?'selected':''}>Not Started</option>

          <div>

            <div class="detail-meta">${esc(h.dept)} &middot; ${esc(h.hireType==='internal'?'Internal transfer':'External hire')} &middot; ${esc(h.manager||'Manager not set')}<br>${esc(h.email||'No email set')} &middot; Start ${esc(fmtDate(h.startDate))}</div>
          </div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-secondary btn-sm" onclick="openEmailModal('${h.id}','welcome-email')"><i class="fa-solid fa-envelope"></i> Email</button>
          <button class="btn btn-secondary btn-sm" onclick="exportTracker('${h.id}')"><i class="fa-solid fa-download"></i> Export</button>
          <button class="btn btn-danger btn-sm" onclick="removeHire('${h.id}')"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
      <div class="detail-stats">
        <div class="detail-stat">
          <div class="stat-label">Current Phase</div>
          <div style="margin-top:6px">${phaseBadge(cp)}</div>
          <div class="stat-sub" style="margin-top:8px">${esc(h.managerSummary||'Add a manager summary.')}</div>
        </div>
        <div class="detail-stat">
          <div class="stat-label">Completion</div>
          <div class="stat-value">${p.pct}%</div>
          <div class="stat-sub">${p.done} of ${p.total} active tasks done</div>
          <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="width:${p.pct}%;background:${pcolor(p.pct)}"></div></div>
        </div>
        <div class="detail-stat">
          <div class="stat-label">Blocked Items</div>
          <div class="stat-value ${blockedCount(h)?'danger':''}">${blockedCount(h)}</div>
          <div class="stat-sub">${blockedCount(h)?'Need direct manager follow-up.':'No active blockers.'}</div>
        </div>
        <div class="detail-stat">
          <div class="stat-label">Next Priority Items</div>
          ${na.length?`<div class="stat-actions">${na.map(i=>`<div class="stat-action-item">${esc(i.title)}</div>`).join('')}</div>`:'<div class="stat-sub">No open tasks remain.</div>'}
        </div>
      </div>
    </div>
    <div class="detail-grid">
      <div id="left-tasks-col">
        ${SECTION_GROUPS.map(g=>renderGroupCard(h,g,cp)).join('')}
      </div>
      <div id="right-panel-col">
        ${buildRightPanel(h)}
      </div>
    </div>
  </div>`;
}

function renderOverview(){
  const root=document.getElementById('overview-view');
  const total=state.hires.length;
  const blocked=state.hires.filter(h=>blockedCount(h));
  const soon=state.hires.filter(h=>['Starting soon','Starts today'].includes(startWindow(h)));
  const complete=state.hires.filter(h=>overall(h)==='complete');
  const PIPE_COLORS={prestart:'var(--muted)',day1:'#6366f1',week1:'var(--accent)',week2:'#0ea5e9',month1:'var(--warn)',complete:'var(--ok)'};
  const pipelineHTML=PHASES.map(([id,label])=>{
    const count=state.hires.filter(h=>currentPhase(h)===id).length;
    const pct=total?Math.round(count/total*100):0;
    return`<div class="ov-pipe-step">
      <div class="ov-pipe-label">${esc(label)}</div>
      <div class="ov-pipe-count">${count}</div>
      <div class="ov-pipe-bar-wrap"><div class="ov-pipe-bar" style="width:${pct}%;background:${PIPE_COLORS[id]||'var(--accent)'}"></div></div>
      <div class="ov-pipe-sub">${total?pct+'% of hires':'—'}</div>
    </div>`;
  }).join('');
  const rosterHTML=!total?`<div class="ov-empty">No hires added yet. Use <strong>Add New Hire</strong> to get started.</div>`:
    [...state.hires].sort((a,b)=>blockedCount(b)-blockedCount(a)||new Date(b.lastUpdatedAt)-new Date(a.lastUpdatedAt)).map(h=>{
      const p=progress(h),bl=blockedCount(h),col=COLORS[h.colorIdx%COLORS.length];
      return`<div class="ov-roster-row" onclick="switchView('detail');selectHire('${h.id}')">
        <div class="ov-roster-avatar" style="background:${col}">${esc(initials(h))}</div>
        <div class="ov-roster-info">
          <div class="ov-roster-name">${esc(h.first)} ${esc(h.last)}</div>
          <div class="ov-roster-meta">${esc(h.manager||'No manager')} &middot; Start ${esc(fmtDate(h.startDate))}</div>
        </div>
        <div class="ov-roster-badges">
          ${phaseBadge(currentPhase(h))}
          ${bl?`<span class="badge s-blocked"><i class="fa-solid fa-triangle-exclamation"></i> ${bl} blocked</span>`:''}
          ${statusBadge(overall(h))}
        </div>
        <div class="ov-roster-progress">
          <div class="ov-roster-pct">${p.pct}% <span style="font-weight:400;color:var(--text-3)">${p.done}/${p.total}</span></div>
          <div class="ov-roster-bar"><div class="ov-roster-fill" style="width:${p.pct}%;background:${pcolor(p.pct)}"></div></div>
        </div>
      </div>`;
    }).join('');
  const attentionHTML=blocked.length?blocked.map(h=>`<div class="ov-side-item">
    <div class="ov-side-dot" style="background:var(--danger)"></div>
    <div>
      <div class="ov-side-item-name">${esc(h.first)} ${esc(h.last)}</div>
      <div class="ov-side-item-sub">${blockedCount(h)} blocked &middot; ${esc(phaseLabel(currentPhase(h)))}<br>${esc(nextActions(h)[0]?.title||'Review blockers')}</div>
    </div>
  </div>`).join(''):`<div class="ov-empty">No blocked hires right now.</div>`;
  const soonHTML=soon.length?soon.map(h=>`<div class="ov-side-item">
    <div class="ov-side-dot" style="background:var(--warn)"></div>
    <div>
      <div class="ov-side-item-name">${esc(h.first)} ${esc(h.last)}</div>
      <div class="ov-side-item-sub">Starts ${esc(fmtDate(h.startDate))}<br>${esc(h.manager||'No manager set')}</div>
    </div>
  </div>`).join(''):`<div class="ov-empty">No upcoming starts this week.</div>`;
  root.innerHTML=`<div class="ov-wrap">
    <div class="ov-kpis">
      <div class="ov-kpi kpi-total"><div class="ov-kpi-icon"><i class="fa-solid fa-users"></i></div><div class="ov-kpi-body"><div class="ov-kpi-num">${total}</div><div class="ov-kpi-label">Total Hires</div><div class="ov-kpi-sub">Active onboarding profiles</div></div></div>
      <div class="ov-kpi kpi-blocked"><div class="ov-kpi-icon"><i class="fa-solid fa-triangle-exclamation"></i></div><div class="ov-kpi-body"><div class="ov-kpi-num">${blocked.length}</div><div class="ov-kpi-label">Blocked</div><div class="ov-kpi-sub">Need direct follow-up</div></div></div>
      <div class="ov-kpi kpi-soon"><div class="ov-kpi-icon"><i class="fa-solid fa-rocket"></i></div><div class="ov-kpi-body"><div class="ov-kpi-num">${soon.length}</div><div class="ov-kpi-label">Starting Soon</div><div class="ov-kpi-sub">Within the next 7 days</div></div></div>
      <div class="ov-kpi kpi-done"><div class="ov-kpi-icon"><i class="fa-solid fa-circle-check"></i></div><div class="ov-kpi-body"><div class="ov-kpi-num">${complete.length}</div><div class="ov-kpi-label">Complete</div><div class="ov-kpi-sub">All active tasks done</div></div></div>
    </div>
    <div class="ov-pipeline-card">
      <div class="ov-card-title"><i class="fa-solid fa-arrow-right-long"></i> Phase Pipeline</div>
      <div class="ov-pipeline">${pipelineHTML}</div>
    </div>
    <div class="ov-main">
      <div class="ov-roster-card">
        <div class="ov-card-title"><i class="fa-solid fa-list-check"></i> All Hires</div>
        ${rosterHTML}
      </div>
      <div class="ov-side">
        <div class="ov-side-card"><div class="ov-side-title"><i class="fa-solid fa-triangle-exclamation"></i> Needs Attention</div>${attentionHTML}</div>
        <div class="ov-side-card"><div class="ov-side-title"><i class="fa-solid fa-rocket"></i> Starting Soon</div>${soonHTML}</div>
      </div>
    </div>
  </div>`;
}

function selectHire(id){state.selectedHireId=id;save();renderSidebar();renderDetail()}
function switchView(v){
  state.view=v;const isDetail=v==='detail';
  document.getElementById('tab-detail').classList.toggle('active',isDetail);
  document.getElementById('tab-overview').classList.toggle('active',!isDetail);
  document.getElementById('detail-view').style.display=isDetail?'block':'none';
  document.getElementById('overview-view').style.display=isDetail?'none':'block';
  if(!isDetail)renderOverview();save();
}
function setFilter(f,el){state.filter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderSidebar();save()}
function toggleGroup(id){document.getElementById(`group-${id}`)?.classList.toggle('collapsed')}
function toggleTaskExpand(id){
  const row=document.getElementById(`taskrow-${id}`);
  if(!row)return;
  row.classList.toggle('expanded');
}
function cycleStatus(hid,id){
  const h=state.hires.find(x=>x.id===hid),order=['not-started','in-progress','done','blocked','not-applicable'];
  if(!h)return;
  const s=tstate(h,id),idx=order.indexOf(s.status);
  s.status=order[(idx+1)%order.length];
  if(s.status==='not-applicable'&&!s.skippedReason)s.skippedReason='Marked not applicable by manager.';
  s.updatedAt=now();touch(h);save();renderSidebar();renderDetail();
  if(state.view==='overview')renderOverview();
}
function setTaskStatus(hid,id,val){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  const s=tstate(h,id);s.status=val;
  if(val==='not-applicable'&&!s.skippedReason)s.skippedReason='Marked not applicable by manager.';
  s.updatedAt=now();touch(h);save();renderSidebar();
  // Re-render just the circle button and title to avoid losing textarea focus
  const row=document.getElementById(`taskrow-${id}`);
  if(row){
    const circle=row.querySelector('.task-circle');
    if(circle){
      circle.className=`task-circle ${val}`;
      const iconMap={done:'fa-check','in-progress':'fa-circle-half-stroke',blocked:'fa-exclamation','not-applicable':'fa-minus'};
      const ic=iconMap[val];
      circle.innerHTML=ic?`<i class="fa-solid ${ic}"></i>`:'';
    }
    const title=row.querySelector('.task-title');
    if(title){title.className=`task-title ${val==='done'?'is-done':''} ${val==='not-applicable'?'is-na':''}`;}
    row.classList.toggle('task-blocked',val==='blocked');
  }
  if(state.view==='overview')renderOverview();
}
function updateTaskField(hid,id,field,val){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  tstate(h,id)[field]=val;
  if(field==='note'&&tstate(h,id).status==='not-applicable')tstate(h,id).skippedReason=val;
  tstate(h,id).updatedAt=now();touch(h);save();renderSidebar();
  if(state.view==='overview')renderOverview();
}
function saveHireField(hid,field,val){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  h[field]=val;touch(h);save();renderSidebar();
  if(state.view==='overview')renderOverview();
}
function openAddModal(){document.getElementById('f-start').value=new Date().toISOString().split('T')[0];document.getElementById('add-modal').classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function addHire(){
  const first=document.getElementById('f-first').value.trim(),last=document.getElementById('f-last').value.trim();
  if(!first||!last){alert('Please enter a first and last name.');return}
  const h=createHire({first,last,dept:document.getElementById('f-dept').value.trim()||'Data Consultant',manager:document.getElementById('f-manager').value.trim(),email:document.getElementById('f-email').value.trim(),eid:document.getElementById('f-eid').value.trim(),startDate:document.getElementById('f-start').value,hireType:document.getElementById('f-hire-type').value,managerSummary:document.getElementById('f-summary').value.trim(),departmentPreset:document.getElementById('f-preset').value});
  h.colorIdx=state.hires.length%COLORS.length;
  state.hires.push(h);state.selectedHireId=h.id;save();closeModal('add-modal');
  ['f-first','f-last','f-manager','f-email','f-eid','f-summary'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-hire-type').value='external';document.getElementById('f-dept').value='Data Consultant';
  renderSidebar();renderDetail();if(state.view==='overview')renderOverview();
}
function removeHire(id){
  if(!confirm('Remove this onboarding profile? This cannot be undone.'))return;
  state.hires=state.hires.filter(h=>h.id!==id);
  if(state.selectedHireId===id)state.selectedHireId=state.hires[0]?.id||null;
  save();renderSidebar();renderDetail();if(state.view==='overview')renderOverview();
}
function draft(h,item){
  const key=item?.emailTemplateKey||'welcome',tpl=EMAILS[key]||EMAILS.welcome;
  const d={name:`${h.first} ${h.last}`.trim(),first:h.first||'there',manager:h.manager||'Manager',department:h.dept||'Data Consultant',startDate:fmtDate(h.startDate),phase:phaseLabel(currentPhase(h)),meetingLink:'[Insert Teams meeting link]',task:item?item.title:'Onboarding follow-up',taskPhase:item?phaseLabel(tstate(h,item.id).targetPhase||item.phase):phaseLabel(currentPhase(h)),note:item?(tstate(h,item.id).note||tstate(h,item.id).skippedReason||''):''};
  return{to:h.email||'[Employee email]',subject:tpl.subject(d),body:tpl.body(d),label:tpl.label};
}
function openEmailModal(hid,itemId){
  const h=state.hires.find(x=>x.id===hid);if(!h)return;
  const item=presetItems(h.departmentPreset).find(i=>i.id===itemId);
  currentDraft=draft(h,item);
  document.getElementById('email-kind').textContent=currentDraft.label;
  document.getElementById('email-to').textContent=currentDraft.to;
  document.getElementById('email-subject').textContent=currentDraft.subject;
  document.getElementById('email-body').value=currentDraft.body;
  document.getElementById('email-mailto').onclick=()=>{const body=document.getElementById('email-body').value,href=`mailto:${encodeURIComponent(currentDraft.to)}?subject=${encodeURIComponent(currentDraft.subject)}&body=${encodeURIComponent(body)}`;window.location.href=href};
  document.getElementById('email-modal').classList.add('open');
}
async function copyEmailDraft(){
  if(!currentDraft)return;
  const text=`To: ${currentDraft.to}\nSubject: ${currentDraft.subject}\n\n${document.getElementById('email-body').value}`;
  try{await navigator.clipboard.writeText(text);alert('Email draft copied.')}catch(e){alert('Copy from the draft box manually.')}
}
function exportTracker(singleId){
  const hires=singleId?state.hires.filter(h=>h.id===singleId):state.hires;
  if(!hires.length)return;
  const sum=hires.map(h=>{const p=progress(h);return`<tr><td>${esc(h.first)} ${esc(h.last)}</td><td>${esc(h.dept)}</td><td>${esc(h.manager||'')}</td><td>${esc(phaseLabel(currentPhase(h)))}</td><td>${p.pct}%</td><td>${blockedCount(h)}</td><td>${esc(fmtDate(h.startDate))}</td><td>${esc(h.managerSummary||'')}</td></tr>`}).join('');
  const rows=hires.map(h=>presetItems(h.departmentPreset).map(i=>{const s=tstate(h,i.id);return`<tr><td>${esc(h.first)} ${esc(h.last)}</td><td>${esc(h.dept)}</td><td>${esc(h.manager||'')}</td><td>${esc(h.hireType||'')}</td><td>${esc(phaseLabel(currentPhase(h)))}</td><td>${esc(i.sectionTitle)}</td><td>${esc(i.title)}</td><td>${esc(phaseLabel(s.targetPhase||i.phase))}</td><td>${esc(i.priority)}</td><td>${esc(s.ownerOverride||i.ownerLabel)}</td><td>${esc(statusLabel(s.status))}</td><td>${esc(s.note||s.skippedReason||'')}</td><td>${esc(s.updatedAt?fmtDT(s.updatedAt):'')}</td></tr>`}).join('')).join('');
  const html=`<html><head><meta charset="UTF-8"><style>body{font-family:Segoe UI,Arial,sans-serif;padding:24px;color:#1b2740}table{border-collapse:collapse;width:100%;margin-bottom:24px}th,td{border:1px solid #d5dfef;padding:8px 10px;font-size:12px;vertical-align:top}th{background:#eaf0fb;text-align:left}</style></head><body><h1>Onboarding Tracker Export</h1><p>Generated ${new Date().toLocaleString('en-US')}.</p><h2>Summary</h2><table><thead><tr><th>Hire</th><th>Dept</th><th>Manager</th><th>Phase</th><th>Completion</th><th>Blocked</th><th>Start</th><th>Summary</th></tr></thead><tbody>${sum}</tbody></table><h2>Task Detail</h2><table><thead><tr><th>Hire</th><th>Dept</th><th>Manager</th><th>Type</th><th>Phase</th><th>Section</th><th>Task</th><th>Target Phase</th><th>Priority</th><th>Owner</th><th>Status</th><th>Note</th><th>Updated</th></tr></thead><tbody>${rows}</tbody></table></body></html>`;
  const blob=new Blob([html],{type:'application/vnd.ms-excel'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=singleId?'onboarding-hire.xls':'onboarding-tracker.xls';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal.open').forEach(m=>m.classList.remove('open'))});
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));
load();renderSidebar();renderDetail();switchView(state.view==='overview'?'overview':'detail');
